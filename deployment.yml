apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-hello-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-hello
  template:
    metadata:
      labels:
        app: flask-hello
    spec:
      containers:
      - name: flask-hello
        image: 224075521027.dkr.ecr.us-east-1.amazonaws.com/flask-hello-app:latest
        ports:
        - containerPort: 3000
